name: "🔄 Actualizar Resultados Mundial"

on:
  schedule:
    # Cada 5 minutos durante el torneo (11 Jun - 19 Jul 2026)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar actualización aunque no haya cambios"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    name: Fetch ESPN + commit

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔄 Fetchear resultados ESPN
        run: node scripts/fetch-scores.js

      - name: 📦 Commit si hay cambios
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/scores.json data/debug.json
          if git diff --staged --quiet; then
            echo "Sin cambios en resultados."
          else
            HORA=$(date -u +'%H:%M UTC')
            git commit -m "⚽ Auto: resultados actualizados $HORA"
            git push
          fi

name: "🔄 Actualizar Resultados Mundial"

on:
  schedule:
    - cron: "0 */3 * * *"   # red de respaldo cada 3h — GitHub puede demorar el disparo real
  workflow_dispatch:

concurrency:
  group: live-scores-polling
  cancel-in-progress: true   # un disparo nuevo reemplaza al anterior (evita 2 procesos pisándose el git push)

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    name: Polling continuo ESPN + notificaciones
    timeout-minutes: 355

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔄 Loop de polling cada 60s durante ~5h45 (casi el máximo de GitHub Actions)
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          END=$((SECONDS + 345*60))
          ITER=0
          while [ $SECONDS -lt $END ]; do
            ITER=$((ITER+1))
            echo "═══ Iteración $ITER — $(date -u +'%H:%M:%S') UTC ═══"
            node scripts/fetch-scores.js || echo "⚠️ fetch-scores.js falló, sigo el loop"

            git add data/scores.json data/debug.json data/notifications-sent.json
            if git diff --staged --quiet; then
              echo "Sin cambios."
            else
              git commit -m "⚽ Auto: resultados $(date -u +'%H:%M UTC')"
              if ! git push; then
                echo "⚠️ push falló, reintentando con pull --rebase"
                git pull --rebase origin master && git push
              fi
            fi

            sleep 60
          done
          echo "✅ Loop de 5h45 completo, terminando job (el próximo tick del cron relanza)"

name: "🔄 Actualizar Resultados Mundial"

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    name: Fetch ESPN + notificaciones

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔄 Fetchear resultados y enviar notificaciones
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: node scripts/fetch-scores.js

      - name: 📦 Commit si hay cambios
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/scores.json data/debug.json data/notifications-sent.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            HORA=$(date -u +'%H:%M UTC')
            git commit -m "⚽ Auto: resultados actualizados $HORA"
            git push
          fi

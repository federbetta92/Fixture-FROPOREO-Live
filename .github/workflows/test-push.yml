name: "🧪 Test Push Notification"
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Inspeccionar estructura real de penales ESPN
        run: |
          curl -s "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260629" \
            -H "User-Agent: Mozilla/5.0" > /tmp/espn_0629.json
          python3 -c "
          import json
          d = json.load(open('/tmp/espn_0629.json'))
          for e in d.get('events', []):
              comp = e['competitions'][0]
              home = comp['competitors'][0]['team']['displayName']
              away = comp['competitors'][1]['team']['displayName']
              if 'German' in home or 'Paraguay' in away or 'German' in away or 'Paraguay' in home:
                  print(json.dumps(e, indent=2)[:6000])
          " > data/espn-pen-debug.json
      - name: 💾 Guardar
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/espn-pen-debug.json
          git diff --staged --quiet && echo "sin cambios" || (git commit -m "diag: estructura penales ESPN" && git push)

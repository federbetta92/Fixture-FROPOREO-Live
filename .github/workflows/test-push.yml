name: "🧪 Test Push Notification"
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 🔍 Diagnóstico + push + estado real de entrega
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');
          const API_KEY = process.env.ONESIGNAL_API_KEY;
          const APP_ID = 'f20b4e99-f0f3-4700-ac24-b95d4f4d464b';
          function req(method, path, body) {
            return new Promise((resolve, reject) => {
              const data = body ? JSON.stringify(body) : null;
              const r = https.request({ hostname:'onesignal.com', path, method,
                headers:{'Authorization':'Key '+API_KEY,'Content-Type':'application/json',
                  ...(data?{'Content-Length':Buffer.byteLength(data)}:{})}
              }, res => { let d=''; res.on('data',c=>d+=c); res.on('end',()=>resolve({status:res.statusCode,body:JSON.parse(d)})); });
              r.on('error',reject); if(data) r.write(data); r.end();
            });
          }
          (async()=>{
            const result = {};
            const app = await req('GET','/api/v1/apps/'+APP_ID);
            result.app = {players:app.body.players, messageable:app.body.messageable_players};

            // Enviar push de prueba
            const notif = await req('POST','/api/v1/notifications',{
              app_id:APP_ID, included_segments:['All'],
              headings:{en:'⚽ Test FROPOREO',es:'⚽ Test FROPOREO'},
              contents:{en:'Funciona! Alertas del Mundial activas',es:'Funciona! Alertas del Mundial activas'},
              url:'https://fixture-froporeo-live.vercel.app/'
            });
            result.notification_create = {id:notif.body.id, recipients:notif.body.recipients, errors:notif.body.errors};

            // Esperar y consultar el estado REAL de entrega (fuente de verdad)
            if (notif.body.id) {
              await new Promise(r=>setTimeout(r,4000));
              const view = await req('GET', '/api/v1/notifications/'+notif.body.id+'?app_id='+APP_ID);
              result.notification_status = {
                successful: view.body.successful,
                failed: view.body.failed,
                errored: view.body.errored,
                remaining: view.body.remaining,
                converted: view.body.converted,
                received: view.body.received,
              };
            }

            console.log(JSON.stringify(result,null,2));
            fs.mkdirSync('data',{recursive:true});
            fs.writeFileSync('data/onesignal-diagnostic.json',JSON.stringify(result,null,2));
          })().catch(e=>{console.error(e);process.exit(1);});
          "
      - name: 💾 Guardar resultado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/onesignal-diagnostic.json
          git diff --staged --quiet && echo "sin cambios" || (git commit -m "diag: estado real de entrega" && git push)

name: "🧪 Test Push Notification"
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 🔍 Ejecutar fetch-scores.js con captura completa
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          set +e
          node scripts/fetch-scores.js > /tmp/full.log 2>&1
          EXIT_CODE=$?
          echo "EXIT_CODE=$EXIT_CODE" >> /tmp/full.log
          cp /tmp/full.log data/debug-run-log.txt
      - name: 💾 Guardar log completo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/debug-run-log.txt
          git diff --staged --quiet && echo "sin cambios" || (git commit -m "diag: log completo de ejecucion" && git push)

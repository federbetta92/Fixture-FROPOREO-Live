name: "🧪 Diagnóstico fetch-scores"
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 🔍 Correr fetch-scores.js una vez y capturar error completo
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          node scripts/fetch-scores.js > /tmp/out.log 2>&1
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          python3 -c "
          import json
          log = open('/tmp/out.log').read()
          json.dump({'exitCode': $EXIT_CODE, 'output': log[-8000:]}, open('data/debug-run.json','w'), indent=2)
          "
      - name: 💾 Guardar
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/debug-run.json
          git diff --staged --quiet && echo "sin cambios" || (git commit -m "diag: debug run output" && git push)

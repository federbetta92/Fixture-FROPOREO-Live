name: "🧪 Test Push Notification"
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Ver estado real de ESPN ahora mismo
        run: |
          TODAY=$(date -u +%Y%m%d)
          echo "=== Fecha consultada: $TODAY ==="
          curl -s "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=$TODAY" \
            -H "User-Agent: Mozilla/5.0" > /tmp/espn.json
          python3 -c "
          import json
          d = json.load(open('/tmp/espn.json'))
          events = d.get('events', [])
          print(f'Eventos encontrados: {len(events)}')
          for e in events:
              comp = e['competitions'][0]
              status = comp['status']['type']
              home = comp['competitors'][0]['team']['displayName']
              away = comp['competitors'][1]['team']['displayName']
              hs = comp['competitors'][0].get('score','?')
              as_ = comp['competitors'][1].get('score','?')
              print(f'  {home} {hs}-{as_} {away} | status: {status[\"name\"]} ({status.get(\"detail\",\"\")}) | date: {e.get(\"date\")}')
          "

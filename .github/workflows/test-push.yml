name: "🧪 Test Push Notification"

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Diagnóstico completo OneSignal
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          echo "=== 1. Info de la app ==="
          curl -s "https://onesignal.com/api/v1/apps/f20b4e99-f0f3-4700-ac24-b95d4f4d464b" \
            -H "Authorization: Key $ONESIGNAL_API_KEY" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('App name:', d.get('name','?'))
          print('Suscriptores totales:', d.get('players',0))
          print('Mensajeables:', d.get('messageable_players',0))
          print('Errores:', d.get('errors','ninguno'))
          "

          echo ""
          echo "=== 2. Lista de suscriptores ==="
          curl -s "https://onesignal.com/api/v1/players?app_id=f20b4e99-f0f3-4700-ac24-b95d4f4d464b&limit=10" \
            -H "Authorization: Key $ONESIGNAL_API_KEY" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          players = d.get('players',[])
          print('Total jugadores:', d.get('total_count',0))
          for p in players:
            print(f'  - id:{p[\"id\"]} device:{p.get(\"device_type\",\"?\")} opted_in:{p.get(\"notification_types\",0)>0} last_active:{p.get(\"last_active\",\"?\")}')
          if not players:
            print('  (ninguno registrado)')
          "

          echo ""
          echo "=== 3. Enviando push de prueba ==="
          RESULT=$(curl -s -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Key $ONESIGNAL_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "f20b4e99-f0f3-4700-ac24-b95d4f4d464b",
              "included_segments": ["All"],
              "headings": {"es": "⚽ Test FROPOREO"},
              "contents": {"es": "Prueba de notificacion del Mundial!"},
              "url": "https://fixture-froporeo-live.vercel.app/"
            }')
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('Notification ID:', d.get('id','—'))
          print('Recipients:', d.get('recipients',0))
          print('Errors:', d.get('errors','ninguno'))
          print('Raw:', d)
          "
